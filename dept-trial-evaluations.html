<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdCity 工具試用評估 — 科組視圖（示意）</title>
<style>
  :root{
    --ec-blue:#008BD1;--ec-blue-dark:#0072ab;--ec-red:#ED1A2E;--ec-green:#00AC6C;
    --ec-maroon:#7B2539;--ec-amber:#F5A623;--ec-purple:#7C5CDB;
    --ink:#1e2a35;--ink-2:#55636f;--ink-3:#8a97a3;--line:#e6ebf0;--bg:#f5f8fa;font-size:18px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--ink);display:flex;min-height:100vh;}
  .sidebar{width:248px;flex-shrink:0;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .sidebar .logo-wrap{padding:20px 16px 14px;border-bottom:1px solid var(--line);}
  .sidebar .logo-wrap img{width:100%;height:auto;display:block;}
  .sidebar .logo-sub{font-size:.68rem;color:var(--ink-3);margin-top:8px;letter-spacing:.04em;}
  .nav{padding:14px 10px;flex:1;}
  .nav-group h6{font-size:.66rem;font-weight:600;color:var(--ec-blue);letter-spacing:.12em;padding:0 10px 8px;text-transform:uppercase;}
  .nav a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:var(--ink-2);text-decoration:none;font-size:.85rem;margin-bottom:2px;}
  .nav a:hover{background:#f2f6f9;}
  .nav a.active{background:#e6f4fb;color:var(--ec-blue-dark);font-weight:600;}
  .sidebar .user{border-top:1px solid var(--line);padding:14px 16px;display:flex;align-items:center;gap:10px;}
  .sidebar .user .avatar{width:34px;height:34px;border-radius:50%;background:var(--ec-maroon);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;}
  .sidebar .user .meta b{font-size:.8rem;display:block;}
  .sidebar .user .meta span{font-size:.68rem;color:var(--ink-3);}

  .main{flex:1;min-width:0;padding:26px 34px 80px;}
  .ribbon{display:inline-flex;align-items:center;gap:7px;font-size:.7rem;font-weight:700;color:#8a6d00;background:#fdf1c7;border:1px solid #f0dfa0;border-radius:99px;padding:5px 14px;margin-bottom:16px;}
  h1{font-size:1.5rem;font-weight:800;}
  .sub{font-size:.82rem;color:var(--ink-2);margin:6px 0 4px;max-width:52em;line-height:1.6;}
  .off-system-note{font-size:.72rem;color:var(--ink-3);margin:6px 0 20px;max-width:52em;line-height:1.6;}

  .trial{
    margin-top:14px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;
    display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;
  }
  .trial .t-ic{width:44px;height:44px;border-radius:12px;background:#f1edfb;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
  .trial .t-body{flex:1;min-width:240px;}
  .trial b{font-size:.9rem;display:block;}
  .trial p{font-size:.78rem;color:var(--ink-2);line-height:1.65;margin-top:5px;}
  .trial .btns{display:flex;gap:9px;flex-shrink:0;align-self:center;}
  .trial.progress .t-ic{background:#fdf1c7;}
  .trial.passed .t-ic{background:#e6f7ef;}
  .trial.declined .t-ic{background:#fee2e2;}
  .trial .state-chip{font-size:.68rem;font-weight:700;border-radius:99px;padding:4px 11px;display:inline-block;margin-top:9px;}
  .trial .state-chip.progress{color:#8a5a00;background:#fdf1c7;}
  .trial .state-chip.passed{color:#0c6b48;background:#e6f7ef;}
  .trial .state-chip.declined{color:#b91c1c;background:#fee2e2;}
  .trial .reason-box{background:#fee2e2;border-radius:8px;padding:9px 12px;margin-top:9px;font-size:.75rem;color:#991b1b;line-height:1.6;width:100%;}
  .trial .cooldown-note{font-size:.72rem;color:var(--ink-3);margin-top:8px;width:100%;}
  .btn{border:none;border-radius:10px;padding:10px 17px;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit;background:var(--ec-blue);color:#fff;}
  .btn.ghost{background:#fff;border:1px solid var(--line);color:var(--ink-2);font-weight:600;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:.78rem;padding:9px 18px;border-radius:99px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:120;}
  .toast.show{opacity:.94;}
  footer.note{margin-top:40px;font-size:.68rem;color:var(--ink-3);text-align:center;}
  @media (max-width:900px){.sidebar{display:none;}.main{padding:18px;}}

  .role-banner{background:#faf1f3;border-bottom:1px solid #e5cdd4;color:var(--ec-maroon);
    font-size:.7rem;font-weight:700;letter-spacing:.18em;padding:9px 34px;position:sticky;top:0;z-index:50;}
  .nav-group h6{color:var(--ec-maroon) !important;}
  .nav a.active{background:#faf1f3 !important;color:var(--ec-maroon) !important;}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo-wrap">
    <img src="edcity_logo.svg" alt="香港教育城 EdCity">
    <div class="logo-sub">AI 教學工具平台 · 原型 v0.1</div>
  </div>
  <nav class="nav">
    <div class="nav-group">
      <h6>領導視圖</h6>
      <a href="dept.html">📈 科組統計</a>
      <a href="dept-trial-evaluations.html" class="active">🧪 工具試用評估</a>
    </div>
    <div class="nav-group" style="margin-top:18px;">
      <h6>教師視圖</h6>
      <a href="index.html">← 返回教師介面</a>
    </div>
  </nav>
  <div class="user">
    <div class="avatar">李</div>
    <div class="meta"><b>李主任</b><span>中文科科主任</span></div>
  </div>
</aside>

<main class="main" style="padding-top:0;">
<div class="role-banner">領 導 ／ 科 組 層 級 — 科 主 任 視 圖</div>
<div style="padding:26px 0 0;">
  <div class="ribbon">🟡 提案中 · 此畫面為設計方案，功能未建置</div>

  <h1>工具試用評估</h1>
  <div class="sub">全科訂閱須先由你實測評估，才能交資訊科技統籌批出；個別教師自行試用毋須經過此步。若評估不通過，會記錄原因，供應商在冷靜期內不能就同一工具再次申請全科評估。</div>
  <div id="trialList"></div>
</div>
</main>

<div class="toast" id="toast"></div>
<script>
guardWholePage('toolTrial', '.main');
const TRIALS = [
  {id:'d1', vendor:'智寫科技', product:'寫作回饋工具', status:'pending', declineReason:null, cooldownUntil:null},
  {id:'d2', vendor:'語音通 AI', product:'AI 朗讀評測全科版', status:'declined',
   declineReason:'試用期內，朗讀評測未能準確分辨地道口音與真正發音錯誤，容易誤導學生。', cooldownUntil:'2026-11-05'},
];

function renderTrials(){
  document.getElementById('trialList').innerHTML = TRIALS.map(t=>{
    let stateChip = '', body = '', btns = '';
    if(t.status==='pending'){
      stateChip = `<span class="state-chip progress">⏳ 待你評估 · 全科訂閱在此之前不會生效</span>`;
      body = `<p>供應商申請中文科全科採用。按管治規則，<b>全科訂閱須先由你實測評估</b>：以真實學生作文檢驗回饋質素，再向資訊科技統籌（訂閱管理）提交建議。</p>`;
      btns = `<button class="btn" onclick="startEval('${t.id}')">開始評估</button>
              <button class="btn ghost" onclick="toast('原型示範：查看供應商合規資料')">查看資料</button>`;
    } else if(t.status==='progress'){
      stateChip = `<span class="state-chip progress">🧪 實測評估中 · 第 3/7 天</span>`;
      body = `<p>正以真實學生作文檢驗回饋質素。完成一週後，請在下方記錄評估結果：通過會交資訊科技統籌批出全科訂閱，不通過須說明原因，並進入冷靜期。</p>`;
      btns = `<button class="btn" onclick="passEval('${t.id}')">✓ 通過，建議全科採用</button>
              <button class="btn ghost" onclick="declineEval('${t.id}')">✕ 不通過</button>`;
    } else if(t.status==='passed'){
      stateChip = `<span class="state-chip passed">✓ 已建議全科採用</span>`;
      body = `<p>評估通過，建議已交資訊科技統籌（訂閱管理），全科訂閱能否批出由他決定名額與方案。</p>`;
      btns = `<button class="btn ghost" onclick="toast('原型示範：前往訂閱管理查看批出進度')">查看訂閱管理 →</button>`;
    } else if(t.status==='declined'){
      stateChip = `<span class="state-chip declined">✕ 評估不通過</span>`;
      body = `<div class="reason-box">評估不通過原因：${t.declineReason}</div>
              <div class="cooldown-note">🔒 冷靜期至 ${t.cooldownUntil}，在此日期前，${t.vendor}不能就「${t.product}」再次申請全科評估。</div>`;
      btns = `<button class="btn ghost" onclick="toast('🔒 冷靜期至 ${t.cooldownUntil}，暫時不能重新申請全科評估')">供應商嘗試重新申請（示範）</button>`;
    }
    return `<div class="trial ${t.status==='pending'?'':t.status}" id="trial-${t.id}">
      <div class="t-ic">🧪</div>
      <div class="t-body">
        <b>「${t.vendor}」${t.product} — 全科訂閱申請</b>
        ${body}
        ${stateChip}
      </div>
      <div class="btns">${btns}</div>
    </div>`;
  }).join('');
}
function startEval(id){
  const t = TRIALS.find(x=>x.id===id);
  t.status='progress';
  renderTrials();
  toast('已開始一週實測評估');
}
function passEval(id){
  const t = TRIALS.find(x=>x.id===id);
  t.status='passed';
  renderTrials();
  toast('評估通過，已交資訊科技統籌處理全科訂閱');
}
function declineEval(id){
  const t = TRIALS.find(x=>x.id===id);
  t.status='declined';
  t.declineReason = t.declineReason || '評估期內未達本科教學需要的水平。';
  t.cooldownUntil = t.cooldownUntil || '2026-10-19';
  renderTrials();
  toast('已記錄評估不通過，冷靜期至 '+t.cooldownUntil);
}
let tt;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),1700);}
renderTrials();
</script>
<script src="feature-flags.js"></script>
<script src="demo-nav.js"></script>
</body>
</html>
